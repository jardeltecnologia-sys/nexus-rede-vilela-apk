          echo "Projeto Android gerado:"
          find generated-android -maxdepth 6 -type f | sort

      - name: Gerar APK debug
        run: |
          cd generated-android
          gradle assembleDebug --no-daemon --stacktrace

      - name: Listar APK gerado
        run: |
          find generated-android -type f -name "*.apk" -print

      - name: Preparar artifact
        run: |
          mkdir -p artifacts
          cp generated-android/app/build/outputs/apk/debug/*.apk artifacts/
          ls -la artifacts

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Assistente-Virtual-debug-apk
          path: artifacts/*.apk
          if-no-files-found: error
